apiVersion: apps/v1
kind: Deployment
metadata:
  name: crowdscope-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crowdscope-backend
  template:
    metadata:
      labels:
        app: crowdscope-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/dsantoreis/crowdscope:latest
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: crowdscope-backend
spec:
  selector:
    app: crowdscope-backend
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
